<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>יוסי תחזוקה</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

/* Chrome / Safari */
::-webkit-scrollbar{
    display:none;
}

/* Firefox */
html{
    scrollbar-width:none;
}

/* IE */
body{
    -ms-overflow-style:none;
}

body{
    font-family:Arial,sans-serif;
    background:#f5f5f5;
    display:flex;
    justify-content:center;
    padding:20px;
}

.wrapper{
    position:relative;
    width:100%;
    max-width:800px;
}

.bg-image{
    width:100%;
    display:block;
  }

/* כל האלמנטים יושבים על התמונה */
.form-overlay{
    position:absolute;
    inset:0;
}

/* עיצוב כללי לשדות */
.form-overlay input,
.form-overlay textarea{
    position:absolute;
    border:none;
    outline:none;
    background:transparent;
    color:#0b2b45;
    font-size:18px;
    font-weight:600;
    text-align:right;
    direction:rtl;
}

.form-overlay input::placeholder,
.form-overlay textarea::placeholder{
    color:#8d96a3;
    font-weight:400;
}

/* שם מלא */
.name-field{
    top:59%;
    right:20%;
    width:60%;
    height:3%;
    background: white !important;
    padding:0 5px 0 15px;
    font-size: 12px !important;
}

/* טלפון */
.phone-field{
   top:64%;
    right:20%;
    width:60%;
    height:3%;
   background: white !important;
    padding:0 5px 0 15px;
    font-size: 12px !important;
}

/* עיר */
.city-field{
    top:68.55%;
    right:20%;
    width:61%;
    height:4%;
    background: white !important;
    padding:0 5px 0 15px;
    font-size: 12px !important;
}

/* מה צריך לתקן */
.msg-field{
    top:74.8%;
    right:21%;
    width:61%;
    height:7.4%;
        background: white !important;
    padding:0px 5px 10px 15px;
    resize:none;
    font-size: 12px !important;
    font-weight: 300 !important;
}

/* כפתור שלח — שקוף מעל הכפתור שבתמונה */
.send-btn{
    position:absolute;
    top:88.9%;
    right:31%;
    width:38%;
    height:5.3%;
    border:none;
    background:transparent;
    cursor:pointer;
    font-size:0;
}

/* כפתור וואטסאפ קטן מתחת */
.whatsapp-btn{
    position:absolute;
    top:94.7%;
    right:31%;
    width:38%;
    height:4%;
    border:none;
    border-radius:14px;
    background:#25D366;
    color:white;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
}
@media(min-width:600px){
    /* שם מלא */
.name-field{
    top:59%;
    right:20.3%;
    width:60%;
    height:3%;
    background: white !important;
    padding:0 5px 0 15px;
    font-size: 12px !important;
}

    /* טלפון */
.phone-field{
   top:64%;
    right:20%;
    width:60%;
    height:3%;
   background: white !important;
    padding:0 5px 0 15px;
    font-size: 12px !important;
}

/* עיר */
.city-field{
    top:68.55%;
    right:20%;
    width:61%;
    height:4%;
    background: white !important;
    padding:0 5px 0 15px;
    font-size: 12px !important;
}

/* מה צריך לתקן */
.msg-field{
    top:74.8%;
    right:21%;
    width:61%;
    height:7.4%;
        background: white !important;
    padding:0px 5px 10px 15px;
    resize:none;
    font-size: 12px !important;
    font-weight: 300 !important;
}
}
/* מובייל */
@media(max-width:500px){
    body{
        padding:0;
        background:#fff;
    }

    .wrapper{
        max-width:100%;
    }

    .form-overlay input,
    .form-overlay textarea{
        font-size:14px;
    }

    .whatsapp-btn{
        font-size:14px;
    }
}

.wrapper{
    position:relative;
    width:100%;
    max-width:800px;
    transition:transform .25s ease;
}
.wrapper{
transform-origin:10% center;
}

.wrapper.form-focused{
    transform:scale(1.03);
}

.wrapper.form-focused{
    transform:scale(1.06);
}

@media (max-width: 768px){

    .wrapper{
        transition:transform .3s ease;
    }

    .wrapper.form-focused{
        transform:scale(1.35);
    }

}

</style>
</head>

<body>

<div class="wrapper">

    <img src="yossi1234.png" class="bg-image" alt="הנדימן">

    <form class="form-overlay" id="leadForm">

        <input
            class="name-field"
            type="text"
            id="fullName"
            placeholder="שם מלא"
            required
        >

        <input
            class="phone-field"
            type="tel"
            id="phone"
            placeholder="טלפון"
            required
        >

        <input
            class="city-field"
            type="text"
            id="city"
            placeholder="עיר / יישוב"
        >

        <textarea
            class="msg-field"
            id="message"
            placeholder="מה צריך לתקן?"
        ></textarea>

        <button class="send-btn" type="submit">
            שלחו לי פרטים
        </button>

    </form>

</div>

<script>
const professionalPhone = "972556605659";

const form = document.getElementById("leadForm");

function buildMessage(){
    const name = document.getElementById("fullName").value.trim();
    const phone = document.getElementById("phone").value.trim();
    const city = document.getElementById("city").value.trim();
    const message = document.getElementById("message").value.trim();

    return `
פנייה חדשה מהאתר:

שם: ${name}
טלפון: ${phone}
עיר: ${city}

מה צריך לתקן:
${message}
    `;
}

document
.querySelectorAll('input, textarea')
.forEach(el => {

    el.addEventListener('focus', () => {
        document.querySelector('.wrapper')
            .classList.add('form-focused');
    });

});

window.addEventListener("focusout", () => {

    setTimeout(() => {

        if (
            !document.activeElement ||
            document.activeElement.tagName !== "INPUT" &&
            document.activeElement.tagName !== "TEXTAREA"
        ) {
            document.querySelector(".wrapper")
                .classList.remove("form-focused");
        }

    }, 300);

});

form.addEventListener("submit", function(e){

    e.preventDefault();

    const text = encodeURIComponent(buildMessage());

    window.open(
        `https://wa.me/${professionalPhone}?text=${text}`,
        "_blank"
    );

});
</script>

</body>
</html>
