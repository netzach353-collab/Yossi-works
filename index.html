<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>יוסי תחזוקה</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}


html,
body{
    scrollbar-width: none;
    -ms-overflow-style: none;
}

html::-webkit-scrollbar,
body::-webkit-scrollbar{
    display: none;
}
html::-webkit-scrollbar,
.msg-field::-webkit-scrollbar{
    display: none;
}

body{
    font-family:Arial,sans-serif;
    background:#f5f5f5;
    display:flex;
    justify-content:center;
    padding:20px;
}

.wrapper{
    position:relative;
    width:100%;
}

.bg-image{
    width:100%;
    display:block;
  }

/* כל האלמנטים יושבים על התמונה */
.form-overlay{
    position:absolute;
    inset:0;
}

/* עיצוב כללי לשדות */
.form-overlay input,
.form-overlay textarea{
    position:absolute;
    border:none;
    outline:none;
    background:transparent;
    color:#0b2b45;
    font-size:18px;
    font-weight:600;
    text-align:right;
    direction:rtl;
}

.form-overlay input::placeholder,
.form-overlay textarea::placeholder{
    color:#006aff;
    font-weight:400;
}

/* שם מלא */
.name-field{
    top:71%;
    left:43.3%;
    width:45%;
    height:5%;
    background: rgb(244, 244, 244) !important;
    padding:0 5px 0 15px;
    font-size: 12px !important;
}

/* טלפון */
.phone-field{
 top:76%;
    left:43.3%;
    width:45%;
    height:5%;
    background: rgb(247, 247, 247) !important;
    padding:0 5px 0 15px;
    font-size: 12px !important;
  
}

/* עיר */
.city-field{
    top:76%;
    left:43.3%;
    width:45%;
    height:5%;
    background: rgb(247, 247, 247) !important;
    padding:0 5px 0 15px;
    font-size: 12px !important;

}

/* מה צריך לתקן */
.msg-field{
    top:82%;
    left:42.3%;
    width:47%;
    height:7.4%;
    background: rgb(247, 247, 247) !important;
    padding:0px 5px 10px 15px;
    resize:none;
    font-size: 12px !important;
    font-weight: 300 !important;
    
}

.phone-field::placeholder {
    color: #000dff !important;
}
.msg-field::placeholder {
    color: #000dff !important;
}


/* כפתור שלח — שקוף מעל הכפתור שבתמונה */
.send-btn{
    position:absolute;
    top:89.9%;
    left:48%;
    width:44%;
    height:5.3%;
    border:none;
    background:transparent;
    cursor:pointer;
    font-size:0;
}

/* כפתור וואטסאפ קטן מתחת */
.whatsapp-btn{
    position:absolute;
    top:94.7%;
    right:31%;
    width:38%;
    height:4%;
    border:none;
    border-radius:14px;
    background:#25D366;
    color:white;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
}
@media(min-width:600px){
    /* שם מלא */
.name-field{
    top:59%;
    right:20.3%;
    width:60%;
    height:3%;
    background: white !important;
    padding:0 5px 0 15px;
    font-size: 12px !important;
}

    /* טלפון */
.phone-field{
   top:64%;
    right:20%;
    width:60%;
    height:3%;
   background: white !important;
    padding:0 5px 0 15px;
    font-size: 12px !important;
}

/* עיר */
.city-field{
    top:68.55%;
    right:20%;
    width:61%;
    height:4%;
    background: white !important;
    padding:0 5px 0 15px;
    font-size: 12px !important;
}

/* מה צריך לתקן */
.msg-field{
    top:74.8%;
    right:21%;
    width:61%;
    height:7.4%;
        background: white !important;
    padding:0px 5px 10px 15px;
    resize:none;
    font-size: 12px !important;
    font-weight: 300 !important;
}
}
/* מובייל */
@media(max-width:500px){
    body{
        padding:0;
        background:#fff;
    }

    .wrapper{
        max-width:100%;
    }

    .form-overlay input,
    .form-overlay textarea{
        font-size:14px;
    }

    .whatsapp-btn{
        font-size:14px;
    }
}



.wrapper{
    transform-origin: center center !important;
}

.wrapper.zoom-in{
    animation: zoomInNormal .25s ease forwards;
}

.wrapper.zoom-out{
    animation: zoomOutNormal .25s ease forwards;
}

@keyframes zoomInNormal{
    from{
        transform:scale(1);
    }
    to{
        transform:translateX(-10%) scale(1.35);
    }
}

@keyframes zoomOutNormal{
    from{
        transform:translateX(-10%) scale(1.35);
    }
    to{
        transform:scale(1);
    }
}

</style>
</head>

<body>

<div class="wrapper">

    <img src="yossi1234.png" class="bg-image" alt="הנדימן">

    <form class="form-overlay" id="leadForm">

        <input
            class="name-field"
            type="text"
            id="fullName"
            placeholder="שם מלא"
            required
        >

        <input
            class="phone-field"
            type="tel"
            id="phone"
            placeholder="טלפון"
            required
        >

        <input
            class="city-field"
            type="text"
            id="city"
            placeholder="עיר / יישוב"
        >

        <textarea
            class="msg-field"
            id="message"
            placeholder="מה צריך לתקן (בקצרה)?"
        ></textarea>

        <button class="send-btn" type="submit">
            שלחו לי פרטים
        </button>

        
    </form>

</div>

<script>
const professionalPhone = "972556605659";

const form = document.getElementById("leadForm");

function buildMessage(){
    const name = document.getElementById("fullName").value.trim();
    const phone = document.getElementById("phone").value.trim();
    const city = document.getElementById("city").value.trim();
    const message = document.getElementById("message").value.trim();

    return `
פנייה חדשה מהאתר:

שם: ${name}
טלפון: ${phone}
עיר: ${city}

מה צריך לתקן:
${message}
    `;
}


const wrapper = document.querySelector(".wrapper");
const fields = document.querySelectorAll("input, textarea");

function zoomIn(){
    wrapper.classList.remove("zoom-out");
    wrapper.classList.add("zoom-in");
}

function zoomOut(){
    wrapper.classList.remove("zoom-in");
    wrapper.classList.add("zoom-out");
}

fields.forEach(field => {

    field.addEventListener("focus", () => {

        zoomIn();

        const x = window.scrollX;
        const y = window.scrollY;

        setTimeout(() => {
            window.scrollTo(x, y);
        }, 50);

        setTimeout(() => {
            window.scrollTo(x, y);
        }, 250);

    });

    field.addEventListener("blur", () => {
        setTimeout(() => {
            if(
                document.activeElement.tagName !== "INPUT" &&
                document.activeElement.tagName !== "TEXTAREA"
            ){
                zoomOut();
            }
        }, 200);
    });

});

form.addEventListener("submit", function(e){

    e.preventDefault();

    const text = encodeURIComponent(buildMessage());

    window.open(
        `https://wa.me/${professionalPhone}?text=${text}`,
        "_blank"
    );

});
</script>

</body>
</html>
